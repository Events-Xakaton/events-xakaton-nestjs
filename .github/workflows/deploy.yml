name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/tribe-events-new/backend/events-xakaton-nestjs

            git config --global --add safe.directory /opt/tribe-events-new/backend/events-xakaton-nestjs

            echo "→ Pulling latest code..."
            git pull origin main

            if [ ! -f .env ]; then
              echo "✗ .env file not found. Create it from .env.example before deploying."
              exit 1
            fi

            echo "→ Ensuring infra is up..."
            docker compose -f docker-compose.infra.yml up -d

            echo "→ Rebuilding and restarting app..."
            docker compose build --no-cache
            docker compose up -d --force-recreate

            echo "→ Removing dangling images..."
            docker image prune -f

            echo "✓ Deployment complete"
