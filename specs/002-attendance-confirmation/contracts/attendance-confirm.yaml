openapi: 3.0.3
info:
  title: Attendance Confirmation Contract
  version: 1.0.0
paths:
  /events/{eventId}/attendance:
    post:
      summary: Bulk-подтверждение присутствия участников организатором
      description: >
        Доступно только создателю события (`creatorUserId`).
        Только для событий в статусе `past`.
        Повторный вызов возвращает 409.
        Участники, не состоящие в событии, игнорируются.
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attendances]
              properties:
                attendances:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [userId]
                    properties:
                      userId:
                        type: string
                        format: uuid
                      rating:
                        type: integer
                        minimum: 1
                        maximum: 5
      responses:
        '200':
          description: Подтверждения применены
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
        '400':
          description: >
            Событие не в статусе past, пустой список attendances,
            или rating вне диапазона 1–5
        '403':
          description: Не создатель события
        '404':
          description: Событие не найдено
        '409':
          description: Подтверждения для этого события уже были отправлены
