services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tribe_events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tribe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tribe_events"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - tribe-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  tribe-network:
    external: true

volumes:
  postgres_data:
  redis_data:
